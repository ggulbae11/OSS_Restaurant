openapi: 3.0.3
info:
  title: Core Service API
  description: |
    메뉴 조회, 주문 생성, 리뷰 작성 등 식당 핵심 비즈니스 API.

    **인증이 필요한 엔드포인트**는 우측 자물쇠 아이콘을 클릭하여
    `Bearer <JWT 토큰>` 형식으로 입력하세요.

    토큰은 Auth Service의 `POST /login`으로 발급받을 수 있습니다.
  version: 1.0.0
  contact:
    name: Restaurant OSS
    url: http://localhost:80

servers:
  - url: http://localhost:8082
    description: 직접 접근
  - url: http://localhost:80
    description: API 게이트웨이 경유

tags:
  - name: 메뉴
    description: 카테고리 및 메뉴 조회 (인증 불필요)
  - name: 주문
    description: 주문 생성 및 조회 (CUSTOMER 인증 필요)
  - name: 리뷰
    description: 리뷰 조회(공개) / 리뷰 작성(CUSTOMER 인증 필요)
  - name: 관리자-메뉴
    description: 메뉴 등록·수정·삭제 (ADMIN 전용)
  - name: 관리자-주문
    description: 전체 주문 조회 및 상태 변경 (ADMIN 전용)
  - name: 관리자-리뷰
    description: 전체 리뷰 조회 및 상태 변경 (ADMIN 전용)
  - name: 관리자-AI
    description: AI 신메뉴 추천·조리 순서 최적화 (ADMIN 전용)

security:
  - bearerAuth: []

paths:

  # ── 카테고리 ──────────────────────────────────────────────────────────────

  /categories:
    get:
      tags: [메뉴]
      summary: 카테고리 목록 조회
      security: []
      responses:
        '200':
          description: 카테고리 목록 반환
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'
              example:
                - id: 1
                  name: 한식
                - id: 2
                  name: 중식
                - id: 3
                  name: 일식
                - id: 4
                  name: 음료

  # ── 메뉴 ─────────────────────────────────────────────────────────────────

  /menus:
    get:
      tags: [메뉴]
      summary: 메뉴 목록 조회
      description: categoryId를 지정하면 해당 카테고리 메뉴만 반환합니다. 생략 시 전체 반환.
      security: []
      parameters:
        - name: categoryId
          in: query
          required: false
          description: 카테고리 ID (생략 시 전체)
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: 메뉴 목록 반환
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuResponse'
              example:
                - id: 1
                  name: 김치찌개
                  price: 9000
                  imageUrl: https://example.com/kimchi.jpg
                  spicyLevel: 3
                  cookTime: 15
                  available: true
                  categoryId: 1
                - id: 2
                  name: 된장찌개
                  price: 8500
                  imageUrl: https://example.com/doenjang.jpg
                  spicyLevel: 0
                  cookTime: 12
                  available: true
                  categoryId: 1

  /menus/{id}:
    get:
      tags: [메뉴]
      summary: 메뉴 단건 조회
      security: []
      parameters:
        - name: id
          in: path
          required: true
          description: 메뉴 ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: 메뉴 정보 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuResponse'
              example:
                id: 1
                name: 김치찌개
                price: 9000
                imageUrl: https://example.com/kimchi.jpg
                spicyLevel: 3
                cookTime: 15
                available: true
                categoryId: 1
        '404':
          description: 메뉴 없음
          content:
            application/json:
              example:
                message: 메뉴를 찾을 수 없습니다.

  # ── 주문 ─────────────────────────────────────────────────────────────────

  /orders:
    post:
      tags: [주문]
      summary: 주문 생성
      description: 장바구니 아이템을 주문으로 등록합니다. AI가 예상 대기 시간을 자동 계산합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
            example:
              items:
                - menuId: 1
                  quantity: 1
                  options: []
                - menuId: 12
                  quantity: 2
                  options: ["아이스"]
              requestNote: 빠른 조리 부탁드려요
      responses:
        '201':
          description: 주문 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
              example:
                id: 3
                customerId: 2
                status: CREATED
                totalPrice: 18000
                requestNote: 빠른 조리 부탁드려요
                estimatedTime: 20
                items:
                  - menuId: 1
                    menuName: 김치찌개
                    unitPrice: 9000
                    quantity: 1
                    options: null
                  - menuId: 12
                    menuName: 아메리카노
                    unitPrice: 4500
                    quantity: 2
                    options: 아이스
                createdAt: "2026-04-30T12:00:00"
        '400':
          description: 유효성 검사 실패 (items 필수, quantity 1 이상)
        '401':
          description: 인증 토큰 없음 또는 만료

  /orders/my:
    get:
      tags: [주문]
      summary: 내 주문 목록 조회
      description: 로그인한 고객의 전체 주문 이력을 반환합니다.
      responses:
        '200':
          description: 주문 목록 반환
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '401':
          description: 인증 토큰 없음

  /orders/{id}:
    get:
      tags: [주문]
      summary: 주문 상세 조회
      parameters:
        - name: id
          in: path
          required: true
          description: 주문 ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: 주문 정보 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '404':
          description: 주문 없음

  # ── 리뷰 ─────────────────────────────────────────────────────────────────

  /reviews:
    get:
      tags: [리뷰]
      summary: 메뉴별 리뷰 조회
      description: NORMAL 상태의 리뷰만 반환합니다.
      security: []
      parameters:
        - name: menuId
          in: query
          required: true
          description: 메뉴 ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: 리뷰 목록 반환
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReviewResponse'
              example:
                - id: 1
                  customerId: 2
                  menuId: 1
                  rating: 5
                  content: 김치찌개가 정말 맛있어요! 국물이 깊고 진해요.
                  status: NORMAL
                  createdAt: "2026-04-19T13:10:00"

    post:
      tags: [리뷰]
      summary: 리뷰 작성
      description: |
        리뷰 제출 시 AI가 자동으로 내용을 검열합니다.
        BLOCKED 판정을 받은 리뷰는 관리자 승인 전까지 노출되지 않습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReviewRequest'
            example:
              menuId: 1
              rating: 5
              content: 김치찌개가 정말 맛있어요!
      responses:
        '201':
          description: 리뷰 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: 유효성 검사 실패 (rating 1~5, content 최대 500자)
        '401':
          description: 인증 토큰 없음

  # ── 관리자 - 메뉴 ─────────────────────────────────────────────────────────

  /admin/menus:
    get:
      tags: [관리자-메뉴]
      summary: 전체 메뉴 조회
      description: 비활성화된 메뉴를 포함한 전체 목록을 반환합니다.
      responses:
        '200':
          description: 메뉴 목록 반환
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuResponse'
        '403':
          description: ADMIN 권한 없음

    post:
      tags: [관리자-메뉴]
      summary: 메뉴 등록
      description: |
        메뉴 등록 시 AI가 자동으로 정책 검사(이름·가격·설명)를 수행합니다.
        정책 위반 시 등록이 거부됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMenuRequest'
            example:
              name: 삼겹살 구이
              price: 14000
              spicyLevel: 1
              cookTime: 18
              imageUrl: https://example.com/samgyup.jpg
              categoryId: 1
      responses:
        '201':
          description: 메뉴 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuResponse'
        '400':
          description: 유효성 검사 실패 또는 AI 정책 위반
        '403':
          description: ADMIN 권한 없음

  /admin/menus/{id}:
    put:
      tags: [관리자-메뉴]
      summary: 메뉴 수정
      parameters:
        - name: id
          in: path
          required: true
          description: 메뉴 ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMenuRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuResponse'
        '404':
          description: 메뉴 없음

    delete:
      tags: [관리자-메뉴]
      summary: 메뉴 비활성화
      description: 메뉴를 삭제하지 않고 판매 중지 상태로 변경합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 메뉴 ID
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: 비활성화 성공
        '404':
          description: 메뉴 없음

  /admin/menus/{id}/enable:
    patch:
      tags: [관리자-메뉴]
      summary: 메뉴 활성화
      description: 비활성화된 메뉴를 다시 판매 가능 상태로 변경합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 메뉴 ID
          schema:
            type: integer
            example: 1
      responses:
        '204':
          description: 활성화 성공
        '404':
          description: 메뉴 없음

  # ── 관리자 - 주문 ─────────────────────────────────────────────────────────

  /admin/orders:
    get:
      tags: [관리자-주문]
      summary: 전체 주문 조회
      responses:
        '200':
          description: 주문 목록 반환
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'
        '403':
          description: ADMIN 권한 없음

  /admin/orders/{id}/status:
    patch:
      tags: [관리자-주문]
      summary: 주문 상태 변경
      description: |
        주문 상태를 변경합니다.

        **허용 상태값**: `ACCEPTED` · `COOKING` · `READY` · `DELIVERING` · `COMPLETED` · `CANCELED`

        **상태 흐름**: CREATED → ACCEPTED → COOKING → READY → DELIVERING → COMPLETED (또는 CANCELED)
      parameters:
        - name: id
          in: path
          required: true
          description: 주문 ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStatusRequest'
            example:
              status: COOKING
      responses:
        '200':
          description: 상태 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        '400':
          description: 잘못된 상태값
        '404':
          description: 주문 없음

  # ── 관리자 - 리뷰 ─────────────────────────────────────────────────────────

  /admin/reviews:
    get:
      tags: [관리자-리뷰]
      summary: 전체 리뷰 조회
      description: BLOCKED·SUSPICIOUS 포함 모든 상태의 리뷰를 반환합니다.
      responses:
        '200':
          description: 리뷰 목록 반환
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReviewResponse'
        '403':
          description: ADMIN 권한 없음

  /admin/reviews/{id}/status:
    patch:
      tags: [관리자-리뷰]
      summary: 리뷰 상태 변경
      description: AI가 SUSPICIOUS으로 분류한 리뷰를 NORMAL 또는 BLOCKED로 최종 판정합니다.
      parameters:
        - name: id
          in: path
          required: true
          description: 리뷰 ID
          schema:
            type: integer
            example: 1
        - name: status
          in: query
          required: true
          description: 변경할 상태
          schema:
            type: string
            enum: [NORMAL, SUSPICIOUS, BLOCKED]
            example: NORMAL
      responses:
        '200':
          description: 상태 변경 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '404':
          description: 리뷰 없음

  # ── 관리자 - AI ───────────────────────────────────────────────────────────

  /admin/ai/menu/suggest:
    post:
      tags: [관리자-AI]
      summary: AI 신메뉴 추천
      description: AI가 현재 매출 데이터를 분석해 새로운 메뉴 아이디어를 1건 제안합니다.
      responses:
        '200':
          description: 신메뉴 추천 결과
          content:
            application/json:
              example:
                name: 된장 크림 파스타
                estimatedPrice: 13000
                reason: 한식·양식 퓨전 트렌드에 맞고 기존 재료 재활용 가능
                suggestion: 된장과 크림 소스를 결합한 퓨전 파스타로, 기존 된장 재고를 활용할 수 있습니다.

  /admin/ai/cook/sequence:
    post:
      tags: [관리자-AI]
      summary: AI 조리 순서 최적화
      description: LPT(Longest Processing Time) 알고리즘과 AI를 결합해 최적 조리 순서를 반환합니다.
      requestBody:
        required: true
        content:
          application/json:
            example:
              items:
                - menuId: 1
                  cookTime: 15
                  menuName: 김치찌개
                - menuId: 2
                  cookTime: 12
                  menuName: 된장찌개
                - menuId: 3
                  cookTime: 20
                  menuName: 불고기
      responses:
        '200':
          description: 최적화된 조리 순서
          content:
            application/json:
              example:
                order: [3, 1, 2]
                reason: 불고기(20분)를 먼저 시작하고, 김치찌개(15분), 된장찌개(12분) 순으로 조리합니다.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 로그인 후 발급된 JWT 토큰을 입력하세요.

  schemas:
    Category:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 한식

    MenuResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 김치찌개
        price:
          type: integer
          example: 9000
        imageUrl:
          type: string
          nullable: true
          example: https://example.com/kimchi.jpg
        spicyLevel:
          type: integer
          minimum: 0
          maximum: 5
          description: 매운맛 단계 (0=안 매움, 5=매우 매움)
          example: 3
        cookTime:
          type: integer
          description: 조리 시간 (분)
          example: 15
        available:
          type: boolean
          description: 판매 여부
          example: true
        categoryId:
          type: integer
          example: 1

    CreateMenuRequest:
      type: object
      required: [name, price, spicyLevel, cookTime, categoryId]
      properties:
        name:
          type: string
          description: 메뉴 이름
          example: 삼겹살 구이
        price:
          type: integer
          minimum: 0
          description: 가격 (원)
          example: 14000
        spicyLevel:
          type: integer
          minimum: 0
          maximum: 5
          description: 매운맛 단계
          example: 1
        cookTime:
          type: integer
          minimum: 1
          description: 조리 시간 (분)
          example: 18
        imageUrl:
          type: string
          nullable: true
          description: 이미지 URL
          example: https://example.com/samgyup.jpg
        categoryId:
          type: integer
          description: 카테고리 ID
          example: 1

    CreateOrderRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItemRequest'
        requestNote:
          type: string
          nullable: true
          description: 요청 사항
          example: 빠른 조리 부탁드려요

    OrderItemRequest:
      type: object
      required: [menuId, quantity]
      properties:
        menuId:
          type: integer
          description: 메뉴 ID
          example: 1
        quantity:
          type: integer
          minimum: 1
          description: 수량
          example: 2
        options:
          type: array
          items:
            type: string
          description: 추가 옵션 (예: 아이스, 곱빼기)
          example: ["아이스"]

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        customerId:
          type: integer
          example: 2
        status:
          type: string
          enum: [CREATED, ACCEPTED, COOKING, READY, DELIVERING, COMPLETED, CANCELED]
          example: COOKING
        totalPrice:
          type: integer
          example: 17000
        requestNote:
          type: string
          nullable: true
          example: 빠른 조리 부탁드려요
        estimatedTime:
          type: integer
          nullable: true
          description: 예상 대기 시간 (분)
          example: 20
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemResponse'
        createdAt:
          type: string
          format: date-time
          example: "2026-04-30T12:00:00"

    OrderItemResponse:
      type: object
      properties:
        menuId:
          type: integer
          example: 1
        menuName:
          type: string
          example: 김치찌개
        unitPrice:
          type: integer
          example: 9000
        quantity:
          type: integer
          example: 1
        options:
          type: string
          nullable: true
          example: null

    UpdateStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACCEPTED, COOKING, READY, DELIVERING, COMPLETED, CANCELED]
          description: 변경할 주문 상태
          example: COOKING

    CreateReviewRequest:
      type: object
      required: [menuId, rating, content]
      properties:
        menuId:
          type: integer
          description: 메뉴 ID
          example: 1
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: 별점 (1~5)
          example: 5
        content:
          type: string
          maxLength: 500
          description: 리뷰 내용 (최대 500자)
